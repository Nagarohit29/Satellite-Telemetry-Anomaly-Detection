services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    image: nagarohit/satellite-backend:latest
    container_name: satellite_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./Backend/data:/app/data
      - ./Backend/models:/app/models
      - ./Backend/results:/app/results
      - ./Backend/checkpoints:/app/checkpoints
    environment:
      - DATASET=${DATASET:-SMAP}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8001
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - satellite_net

  middleware:
    build:
      context: .
      dockerfile: Middleware/Dockerfile
    image: nagarohit/satellite-middleware:latest
    container_name: satellite_middleware
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .env:/app/.env
      - ./Middleware/.env:/app/Middleware/.env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_API_BASE=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - BACKEND_URL=http://backend:8001
      - LITELLM_LOG=ERROR
    depends_on:
      backend:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - satellite_net

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    image: nagarohit/satellite-frontend:latest
    container_name: satellite_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      middleware:
        condition: service_healthy
    networks:
      - satellite_net

  ollama:
    image: ollama/ollama:latest
    container_name: satellite_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama_init.sh:/app/ollama_init.sh
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    entrypoint: ["/bin/bash", "/app/ollama_init.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q '${OLLAMA_MODEL:-llama3.2}'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - satellite_net

volumes:
  ollama_data:

networks:
  satellite_net:
    driver: bridge
