services:
  satellite-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: satellite-telemetry-anomaly-detection:latest
    container_name: satellite-telemetry
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:8000"
      - "8001:8001"
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./Backend/data:/app/Backend/data
      - ./Backend/models:/app/Backend/models
      - ./Backend/results:/app/Backend/results
      - .env:/app/.env
      - ./Middleware/.env:/app/Middleware/.env
    environment:
      - DATASET=${DATASET:-SMAP}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - LITELLM_LOG=ERROR
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/api/health', timeout=3)\" || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  ollama_data:
