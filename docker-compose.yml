version: "3.8"

services:

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: satellite_backend
    ports:
      - "8001:8001"
    volumes:
      - ./Backend/data:/app/data
      - ./Backend/models:/app/models
      - ./Backend/results:/app/results
    environment:
      - DATASET=${DATASET}
      - WINDOW_SIZE=${WINDOW_SIZE}
      - THRESHOLD=${THRESHOLD}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - satellite_net

  ollama:
    image: ollama/ollama:latest
    container_name: satellite_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - satellite_net

  middleware:
    build:
      context: .
      dockerfile: Middleware/Dockerfile
    container_name: satellite_middleware
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_BASE=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - BACKEND_URL=http://backend:8001
    depends_on:
      - backend
      - ollama
    networks:
      - satellite_net

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: satellite_frontend
    ports:
      - "3000:80"
    depends_on:
      - middleware
    networks:
      - satellite_net

volumes:
  ollama_data:

networks:
  satellite_net:
    driver: bridge